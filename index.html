<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fanavid Smart Load - Premium</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h2>Fanavid Smart Load</h2>
<p class="subtitle">Logística Inteligente: Ethos | Comax | Juandi</p>

<label>TIPO DE VEÍCULO:</label>
<select id="veiculo">
<option value="carreta">Carreta Padrão (33m²)</option>
<option value="truck">Caminhão Truck (22m²)</option>
<option value="vlc">VLC / 3/4 (12m²)</option>
</select>

<div class="grid-inputs">
<div>
<label>ETHOS:</label>
<input type="number" id="qEthos" placeholder="0">
</div>
<div>
<label>JUANDI:</label>
<input type="number" id="qJuandi" placeholder="0">
</div>
</div>

<div class="full-width">
<label>COMAX:</label>
<input type="number" id="qComax" placeholder="0">
</div>

<div class="checkbox-container">
<input type="checkbox" id="empilhado">
<label for="empilhado">📦 CARGA COM 2 ANDARES</label>
</div>

<button onclick="calcularCarga()">CALCULAR EFICIÊNCIA</button>

<div id="resultado"></div>

<div class="footer">
🚛💨 <span>Expedição Fanavid</span>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
